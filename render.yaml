services:
  - type: web
    name: andwaw
    runtime: python
    buildCommand: apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-ara && pip install -r requirements.txt && python -m spacy download en_core_web_sm && python -m nltk.downloader punkt punkt_tab
    startCommand: gunicorn app:app --workers 1 --timeout 300 --bind 0.0.0.0:$PORT
